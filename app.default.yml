server:
  host: localhost
  port: 3000
validation:
  username: ^[a-zA-Z]+$
  password: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$
ldap:
  domain: ldap://localhost:389
  userDn: cn=admin,dc=example,dc=com
  password: admin
  baseDn: ou=users,dc=example,dc=com
  searchFilter: (objectClass=*)
