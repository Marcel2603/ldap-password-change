name: Go-test
on:
  push:
    branches:
      - later
  pull_request:
    branches:
      - later
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Generate view
        run: go generate ./

      - name: Test with the Go CLI
        run: go test ./... 
