name: Validate Generation

on:
  pull_request:

jobs:
  validate-doc-gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Validate Generation
        run: |
          make generate
          git diff --exit-code -- **/*.md || echo "Generate Documentation locally using 'make generate'"
