[project]
site_name = "LDAP Password Change"
site_url = "https://marcel2603.github.io/ldap-password-change/"
repo_url = "https://github.com/Marcel2603/ldap-password-change"
repo_name = "Marcel2603/ldap-password-change"
docs_dir = "pages"
extra_css = ["stylesheets/max_width.css"]
nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Overview" = "getting-started/index.md" },
    { "Customisation" = "getting-started/customisation.md" },
    { "Architecture" = "getting-started/architecture.md" },
    { "Health" = "getting-started/health.md" },
    { "Metrics" = "getting-started/metrics.md" },
    { "Usage" = "getting-started/usage.md" },
    { "Configuration" = [
      { "Overview" = "getting-started/configuration/index.md" },
      { "What" = "getting-started/configuration/what.md" },
      { "Where" = "getting-started/configuration/where.md" }
    ]}
  ]},
  { "Development" = [
    { "Overview" = "development/index.md" },
    { "Release" = "development/release.md" }
  ]},
  { "About" = [
    { "Security" = "about/security.md" },
    { "License" = "about/license.md" }
  ]}
]

[project.theme]
variant = "modern"
features = [
    "navigation.indexes",
    "navigation.instant",
    "navigation.tracking",
    "navigation.path",
    "search.suggest",
    "search.highlight",
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
]

[project.theme.font]
text = "Inter"
code = "Jetbrains Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle = { icon = "material/brightness-auto", name = "Switch to light mode" }

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "white"
accent = "indigo"
toggle = { icon = "material/brightness-7", name = "Switch to dark mode" }

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "indigo"
toggle = { icon = "material/brightness-4", name = "Switch to system preference" }

[project.markdown]
extensions = [
    "admonition",
    "footnotes",
    "tables"
]

[project.markdown.toc]
permalink = true

[project.plugins]
search = {}
autolinks = {}

[project.plugins.git-revision-date-localized]
fallback_to_build_date = true

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
